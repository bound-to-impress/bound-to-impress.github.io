<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Under Construction</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .icon-wrapper {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #7f8c8d;
        }

        .progress-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 20px;
            margin: 2rem 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 75%; /* Adjust this to show progress */
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 20px;
        }

        .contact {
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">🏗️</div>
        <h1>Under Construction</h1>
        <p>We’re currently polishing the gears and painting the pixels. Something awesome is coming your way very soon!</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <p class="contact">
            Need to reach us? <br>
            Email: <a href="mailto:hello@yourdomain.com">hello@yourdomain.com</a>
        </p>
    </div>

</body>
</html>
