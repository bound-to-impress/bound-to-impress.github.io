<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Weight Calculator</title>
    <script src="assets/vendor/tailwind/browser.js"></script>
    <link href="assets/vendor/material-icons/material-icons.css" rel="stylesheet">
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-dvh flex items-start justify-center p-4 pt-6 font-sans transition-colors duration-200">

    <main class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6 sm:p-8 w-full max-w-md">
        <div class="flex items-center justify-between gap-4 mb-6">
            <h1 class="text-2xl font-bold text-balance text-slate-800 dark:text-slate-100">Paper Weight Calculator</h1>
            <div class="flex shrink-0 items-center gap-1">
                <button id="openSheetReference" type="button" aria-label="View common sheet sizes" title="View common sheet sizes" class="flex size-10 items-center justify-center rounded-full text-blue-600 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-blue-400 dark:hover:bg-slate-700">
                    <span class="material-icons" aria-hidden="true">table_chart</span>
                </button>
                <button id="darkToggle" type="button" aria-label="Toggle dark mode" class="flex size-10 items-center justify-center rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="material-icons" id="darkToggleIcon" aria-hidden="true">dark_mode</span>
                </button>
            </div>
        </div>

        <form id="calculatorForm" class="space-y-4">
            <div>
                <label for="gsm" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Paper weight (GSM)</label>
                <input type="number" id="gsm" min="0.01" step="any" required inputmode="decimal" class="mt-1 block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <fieldset>
                <legend class="block text-sm font-medium text-slate-700 dark:text-slate-300">Sheet size (mm)</legend>
                <div class="grid grid-cols-2 gap-4 mt-1">
                    <div>
                        <label for="width" class="block text-xs font-medium text-slate-600 dark:text-slate-400">Width</label>
                        <input type="number" id="width" min="0.01" step="any" required inputmode="decimal" class="mt-1 block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="height" class="block text-xs font-medium text-slate-600 dark:text-slate-400">Height</label>
                        <input type="number" id="height" min="0.01" step="any" required inputmode="decimal" class="mt-1 block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </fieldset>

            <div>
                <label for="quantity" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Number of sheets</label>
                <input type="number" id="quantity" min="1" step="1" value="1" required inputmode="numeric" class="mt-1 block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                Calculate
            </button>
        </form>

        <div id="resultAlert" aria-live="polite" class="hidden mt-6 p-4 rounded-md border border-blue-200 bg-blue-50 text-blue-900 dark:border-blue-800 dark:bg-blue-950/50 dark:text-blue-200">
            <p class="text-sm font-medium">Total paper weight</p>
            <p id="resultText" class="mt-1 text-3xl font-bold tabular-nums"></p>
            <p id="detailsText" class="mt-2 text-xs text-pretty opacity-90 tabular-nums"></p>
        </div>
    </main>

    <dialog id="sheetReferenceDialog" aria-labelledby="sheetReferenceTitle" class="m-auto w-[calc(100%-2rem)] max-w-3xl rounded-xl bg-white p-0 shadow-xl backdrop:bg-slate-950/60 dark:bg-slate-800">
        <div class="p-5 sm:p-6">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h2 id="sheetReferenceTitle" class="text-xl font-bold text-balance text-slate-900 dark:text-slate-100">Common sheet sizes</h2>
                    <p class="mt-1 text-sm text-pretty text-slate-600 dark:text-slate-300">Select a BoxBoard to fill the calculator.</p>
                </div>
                <button id="closeSheetReference" type="button" aria-label="Close sheet size reference" class="flex size-10 shrink-0 items-center justify-center rounded-full text-slate-500 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-400 dark:hover:bg-slate-700">
                    <span class="material-icons" aria-hidden="true">close</span>
                </button>
            </div>

            <div class="mt-5 overflow-x-auto rounded-lg border border-slate-200 dark:border-slate-700">
                <table class="w-full min-w-xl border-collapse text-left text-sm tabular-nums">
                    <thead class="bg-slate-50 text-slate-700 dark:bg-slate-900/50 dark:text-slate-300">
                        <tr>
                            <th scope="col" class="px-4 py-3 font-semibold">Code</th>
                            <th scope="col" class="px-4 py-3 font-semibold">Width</th>
                            <th scope="col" class="px-4 py-3 font-semibold">Height</th>
                            <th scope="col" class="px-4 py-3 font-semibold">GSM</th>
                        </tr>
                    </thead>
                    <tbody id="sheetReferenceRows" class="divide-y divide-slate-200 text-slate-700 dark:divide-slate-700 dark:text-slate-200">
                        <tr data-gsm="700" data-width="760" data-height="1020" class="cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700">
                            <th scope="row" class="whitespace-nowrap px-4 py-3 font-medium">
                                <button type="button" class="select-sheet text-left text-blue-700 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded dark:text-blue-400">BoxBoard 1200</button>
                            </th>
                            <td class="px-4 py-3">760 mm</td>
                            <td class="px-4 py-3">1020 mm</td>
                            <td class="px-4 py-3">700</td>
                        </tr>
                        <tr data-gsm="700" data-width="610" data-height="860" class="cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700">
                            <th scope="row" class="whitespace-nowrap px-4 py-3 font-medium">
                                <button type="button" class="select-sheet text-left text-blue-700 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded dark:text-blue-400">BoxBoard A1+ 1200</button>
                            </th>
                            <td class="px-4 py-3">610 mm</td>
                            <td class="px-4 py-3">860 mm</td>
                            <td class="px-4 py-3">700</td>
                        </tr>
                        <tr data-gsm="1050" data-width="760" data-height="1020" class="cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700">
                            <th scope="row" class="whitespace-nowrap px-4 py-3 font-medium">
                                <button type="button" class="select-sheet text-left text-blue-700 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded dark:text-blue-400">BoxBoard 1750</button>
                            </th>
                            <td class="px-4 py-3">760 mm</td>
                            <td class="px-4 py-3">1020 mm</td>
                            <td class="px-4 py-3">1050</td>
                        </tr>
                        <tr data-gsm="1780" data-width="760" data-height="1020" class="cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700">
                            <th scope="row" class="whitespace-nowrap px-4 py-3 font-medium">
                                <button type="button" class="select-sheet text-left text-blue-700 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded dark:text-blue-400">BoxBoard 3000</button>
                            </th>
                            <td class="px-4 py-3">760 mm</td>
                            <td class="px-4 py-3">1020 mm</td>
                            <td class="px-4 py-3">1780</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </dialog>

    <script>
        const sheetReferenceDialog = document.getElementById('sheetReferenceDialog');
        const openSheetReference = document.getElementById('openSheetReference');
        const closeSheetReference = document.getElementById('closeSheetReference');
        const sheetReferenceRows = document.getElementById('sheetReferenceRows');
        const gsmInput = document.getElementById('gsm');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');

        openSheetReference.addEventListener('click', () => {
            sheetReferenceDialog.showModal();
        });

        closeSheetReference.addEventListener('click', () => {
            sheetReferenceDialog.close();
        });

        sheetReferenceDialog.addEventListener('click', (event) => {
            if (event.target === sheetReferenceDialog) {
                sheetReferenceDialog.close();
            }
        });

        sheetReferenceRows.addEventListener('click', (event) => {
            const row = event.target.closest('tr[data-gsm]');
            if (!row) return;

            gsmInput.value = row.dataset.gsm;
            widthInput.value = row.dataset.width;
            heightInput.value = row.dataset.height;
            sheetReferenceDialog.close();
        });

        const html = document.documentElement;
        const darkToggle = document.getElementById('darkToggle');
        const darkToggleIcon = document.getElementById('darkToggleIcon');

        function applyDarkMode(isDark) {
            html.classList.toggle('dark', isDark);
            darkToggleIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
        }

        const savedDark = localStorage.getItem('darkMode');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyDarkMode(savedDark !== null ? savedDark === 'true' : prefersDark);

        darkToggle.addEventListener('click', () => {
            const isDark = !html.classList.contains('dark');
            applyDarkMode(isDark);
            localStorage.setItem('darkMode', isDark);
        });

        const weightFormatter = new Intl.NumberFormat(undefined, {
            minimumFractionDigits: 1,
            maximumFractionDigits: 1
        });

        const areaFormatter = new Intl.NumberFormat(undefined, {
            maximumFractionDigits: 3
        });

        document.getElementById('calculatorForm').addEventListener('submit', (event) => {
            event.preventDefault();

            const gsm = Number.parseFloat(document.getElementById('gsm').value);
            const widthMm = Number.parseFloat(document.getElementById('width').value);
            const heightMm = Number.parseFloat(document.getElementById('height').value);
            const quantity = Number.parseInt(document.getElementById('quantity').value, 10);

            const sheetAreaSquareMetres = (widthMm * heightMm) / 1_000_000;
            const weightPerSheetGrams = gsm * sheetAreaSquareMetres;
            const totalAreaSquareMetres = sheetAreaSquareMetres * quantity;
            const totalWeightGrams = weightPerSheetGrams * quantity;
            const totalWeightKilograms = totalWeightGrams / 1000;

            document.getElementById('resultText').textContent = `${weightFormatter.format(totalWeightKilograms)} kg`;
            document.getElementById('detailsText').textContent =
                `${weightFormatter.format(weightPerSheetGrams)} g per sheet · ${weightFormatter.format(totalWeightGrams)} g total · ${areaFormatter.format(totalAreaSquareMetres)} m² total area`;
            document.getElementById('resultAlert').classList.remove('hidden');
        });
    </script>

</body>
</html>
