<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Weight Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white rounded-xl shadow-lg p-6 sm:p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">Cubic Weight Calculator</h1>

        <form id="calculatorForm" class="space-y-4">
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label for="length" class="block text-sm font-medium text-slate-700">Length</label>
                    <input type="number" id="length" min="0" step="any" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="width" class="block text-sm font-medium text-slate-700">Width</label>
                    <input type="number" id="width" min="0" step="any" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="height" class="block text-sm font-medium text-slate-700">Height</label>
                    <input type="number" id="height" min="0" step="any" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <label for="weight" class="block text-sm font-medium text-slate-700">Actual Weight (kg)</label>
                <input type="number" id="weight" min="0" step="any" required class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="unit" class="block text-sm font-medium text-slate-700">Measurement Unit</label>
                <select id="unit" class="mt-1 block w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-700 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="cm" selected>Centimetres (cm)</option>
                    <option value="mm">Millimetres (mm)</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Calculate
            </button>
        </form>

        <div id="resultAlert" class="hidden mt-6 p-4 rounded-md text-sm">
            <p id="resultText" class="font-medium"></p>
            <p id="detailsText" class="mt-2 text-xs opacity-90"></p>
        </div>
    </div>

    <script>
        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload

            // Get values
            const unit = document.getElementById('unit').value;
            let length = parseFloat(document.getElementById('length').value);
            let width = parseFloat(document.getElementById('width').value);
            let height = parseFloat(document.getElementById('height').value);
            const actualWeight = parseFloat(document.getElementById('weight').value);

            // Convert dimensions to meters for standard cubic weight formula (L * W * H * 250)
            if (unit === 'cm') {
                length = length / 100;
                width = width / 100;
                height = height / 100;
            } else if (unit === 'mm') {
                length = length / 1000;
                width = width / 1000;
                height = height / 1000;
            }

            // Calculate Cubic Weight
            const cubicVolume = length * width * height;
            const cubicWeight = cubicVolume * 250;

            // UI Elements
            const resultAlert = document.getElementById('resultAlert');
            const resultText = document.getElementById('resultText');
            const detailsText = document.getElementById('detailsText');

            // Reset classes
            resultAlert.classList.remove('hidden', 'bg-red-50', 'text-red-800', 'border-red-200', 'bg-green-50', 'text-green-800', 'border-green-200');
            resultAlert.classList.add('border');

            // Logic to check if cubic weight > actual weight
            if (cubicWeight > actualWeight) {
                resultAlert.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                resultText.textContent = "⚠️ The Cubic Weight is GREATER than the Actual Weight.";
            } else {
                resultAlert.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
                resultText.textContent = "✅ The Cubic Weight is LESS than or equal to the Actual Weight.";
            }

            // Display the numbers so the user can verify
            detailsText.textContent = `Calculated Cubic Weight: ${cubicWeight.toFixed(2)} kg | Actual Weight: ${actualWeight.toFixed(2)} kg`;
        });
    </script>

</body>
</html>
